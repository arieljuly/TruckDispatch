services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: truck_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"  
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: truck_dispatch
      MYSQL_USER: truck_user
      MYSQL_PASSWORD: truck_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - truck-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHPMyAdmin (Optional)
  phpmyadmin:
    image: arm64v8/phpmyadmin
    container_name: truck_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"  # Changed to avoid conflict
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - truck-network

  # Python FastAPI Service
  python-api:
    build:
      context: ./DispatchAlgo
      dockerfile: Dockerfile
    container_name: truck_python_api
    restart: unless-stopped
    ports:
      - "8000:8000"  # Python API on port 8000
    volumes:
      - ./DispatchAlgo:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - truck-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Application
  laravel:
    build:
      context: ./TruckDispatchLara
      dockerfile: Dockerfile
    container_name: truck_laravel
    restart: unless-stopped
    ports:
      - "8080:8000"  # Laravel on port 8080 (since Python uses 8000)
    volumes:
      - ./TruckDispatchLara:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080  # Updated to match the port
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=truck_dispatch
      - DB_USERNAME=truck_user
      - DB_PASSWORD=truck_password
      - ALGO_API_URL=http://python-api:8000  # Internal Docker network communication
    depends_on:
      mysql:
        condition: service_healthy
      python-api:
        condition: service_healthy
    networks:
      - truck-network

networks:
  truck-network:
    driver: bridge

volumes:
  mysql_data: